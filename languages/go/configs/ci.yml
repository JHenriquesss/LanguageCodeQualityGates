# Copy to .github/workflows/quality-gate.yml in the target repo.
# Enforces GO-CODE-QUALITY-GATE.md Normative Core MUST items 1-5.
name: quality-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Versions (evidence)
        run: go version && go env GOVERSION GOOS GOARCH CGO_ENABLED

      - name: Format (MUST 2)
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Build (MUST 1)
        run: go build ./...

      - name: Vet (MUST 3)
        run: go vet ./...

      - name: Lint (MUST 3)
        uses: golangci/golangci-lint-action@v6
        with:
          args: --timeout=5m

      - name: Test + race (MUST 4)
        run: go test -race -count=1 ./...

      - name: Coverage (MUST 5)
        run: |
          go test -covermode=atomic -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

      - name: Vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
